{% extends "layout.html" %}

{% block title %}Sign Up — ToDo App{% endblock %}

{% block content %}
<style>
    .auth-wrapper {
        min-height: calc(100vh - 64px - 60px);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .auth-card {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 48px 44px;
        box-shadow: 0 8px 48px rgba(26,22,18,0.07);
        animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    .auth-badge {
        display: inline-block;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--accent);
        border: 1px solid rgba(232,93,47,0.25);
        border-radius: 100px;
        padding: 5px 14px;
        margin-bottom: 20px;
    }

    .auth-card h2 {
        font-family: 'Playfair Display', serif;
        font-size: 34px;
        font-weight: 900;
        letter-spacing: -0.02em;
        color: var(--dark);
        line-height: 1.1;
        margin-bottom: 8px;
    }

    .auth-card h2 em {
        font-style: italic;
        color: var(--accent);
    }

    .auth-subtitle {
        font-size: 14px;
        color: var(--muted);
        font-weight: 300;
        margin-bottom: 36px;
    }

    /* Error message */
    .auth-error {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(232,93,47,0.08);
        border: 1px solid rgba(232,93,47,0.2);
        color: var(--accent);
        font-size: 13px;
        font-weight: 500;
        padding: 11px 16px;
        border-radius: 12px;
        margin-bottom: 24px;
    }

    .auth-error::before {
        content: '⚠';
        font-size: 14px;
        flex-shrink: 0;
    }

    /* Form fields */
    .field {
        margin-bottom: 16px;
    }

    .field label {
        display: block;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
    }

    .field input {
        width: 100%;
        padding: 13px 16px;
        background: var(--cream);
        border: 1.5px solid var(--border);
        border-radius: 12px;
        font-family: 'DM Sans', sans-serif;
        font-size: 15px;
        color: var(--dark);
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .field input::placeholder {
        color: rgba(140,130,121,0.5);
    }

    .field input:focus {
        border-color: rgba(232,93,47,0.45);
        box-shadow: 0 0 0 3px rgba(232,93,47,0.08);
    }

    /* Submit button */
    .btn-submit {
        width: 100%;
        margin-top: 8px;
        padding: 14px;
        background: var(--dark);
        color: var(--cream);
        border: none;
        border-radius: 100px;
        font-family: 'DM Sans', sans-serif;
        font-size: 15px;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-submit:hover {
        background: var(--accent);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(232,93,47,0.3);
    }

    .btn-submit svg {
        transition: transform 0.2s ease;
    }

    .btn-submit:hover svg {
        transform: translateX(3px);
    }

    /* Footer link */
    .auth-footer {
        text-align: center;
        margin-top: 28px;
        font-size: 13px;
        color: var(--muted);
    }

    .auth-footer a {
        color: var(--dark);
        font-weight: 500;
        text-decoration: none;
        border-bottom: 1px solid rgba(26,22,18,0.2);
        padding-bottom: 1px;
        transition: color 0.15s ease, border-color 0.15s ease;
    }

    .auth-footer a:hover {
        color: var(--accent);
        border-color: var(--accent);
    }

    .divider {
        height: 1px;
        background: var(--border);
        margin: 28px 0;
    }
</style>

<div class="auth-wrapper">
    <div class="auth-card">

        <span class="auth-badge">✦ New here</span>
        <h2>Create your<br><em>account.</em></h2>
        <p class="auth-subtitle">Join and start ticking things off.</p>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="post">
            <div class="field">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a strong password" required>
            </div>

            <div class="divider"></div>

            <button type="submit" class="btn-submit">
                Create account
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M3 7h8M7 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </form>

        <p class="auth-footer">Already have an account? <a href="/login">Sign in</a></p>

    </div>
</div>
{% endblock %}
