<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome — Todo</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --cream: #FAF7F2;
            --dark: #1A1612;
            --accent: #E85D2F;
            --muted: #8C8279;
            --card: #F2EDE5;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Background grain texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* Decorative circles */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }
        .blob-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(232,93,47,0.12), transparent 70%);
            top: -150px; right: -100px;
            animation: drift 8s ease-in-out infinite alternate;
        }
        .blob-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(139,110,80,0.1), transparent 70%);
            bottom: -100px; left: -80px;
            animation: drift 10s ease-in-out infinite alternate-reverse;
        }

        @keyframes drift {
            from { transform: translate(0, 0); }
            to   { transform: translate(30px, 20px); }
        }

        /* Decorative line */
        .deco-line {
            position: fixed;
            top: 0; left: 50%;
            width: 1px; height: 100vh;
            background: linear-gradient(to bottom, transparent, rgba(26,22,18,0.07), transparent);
            transform: translateX(-50%);
            pointer-events: none;
        }

        /* Main card */
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 0 24px;
            animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(32px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
            border: 1px solid rgba(232,93,47,0.3);
            border-radius: 100px;
            padding: 6px 18px;
            margin-bottom: 32px;
            animation: fadeUp 0.9s 0.1s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(52px, 8vw, 88px);
            font-weight: 900;
            line-height: 0.95;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            animation: fadeUp 0.9s 0.15s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        h1 em {
            font-style: italic;
            color: var(--accent);
        }

        .subtitle {
            font-size: 16px;
            font-weight: 300;
            color: var(--muted);
            margin-top: 20px;
            margin-bottom: 52px;
            letter-spacing: 0.01em;
            animation: fadeUp 0.9s 0.22s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .actions {
            display: flex;
            gap: 14px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            animation: fadeUp 0.9s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 15px 36px;
            border-radius: 100px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 500;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--dark);
            color: var(--cream);
            box-shadow: 0 4px 20px rgba(26,22,18,0.2);
        }

        .btn-primary:hover {
            background: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(232,93,47,0.35);
        }

        .btn-secondary {
            background: transparent;
            color: var(--dark);
            border: 1.5px solid rgba(26,22,18,0.2);
        }

        .btn-secondary:hover {
            background: var(--card);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(26,22,18,0.08);
        }

        /* Floating task pills */
        .floaters {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .pill {
            position: absolute;
            background: var(--card);
            border: 1px solid rgba(26,22,18,0.07);
            border-radius: 100px;
            padding: 10px 20px;
            font-size: 13px;
            font-weight: 400;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            animation: floatPill linear infinite;
        }

        .pill .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.6;
        }

        .pill:nth-child(1) { top: 12%; left: 5%;  animation-duration: 18s; animation-delay: 0s; }
        .pill:nth-child(2) { top: 25%; right: 4%; animation-duration: 22s; animation-delay: -5s; }
        .pill:nth-child(3) { bottom: 30%; left: 3%; animation-duration: 20s; animation-delay: -8s; }
        .pill:nth-child(4) { bottom: 15%; right: 6%; animation-duration: 16s; animation-delay: -3s; }
        .pill:nth-child(5) { top: 55%; left: 8%;  animation-duration: 24s; animation-delay: -11s; }

        @keyframes floatPill {
            0%, 100% { transform: translateY(0px) rotate(-1deg); }
            25% { transform: translateY(-10px) rotate(0.5deg); }
            50% { transform: translateY(-5px) rotate(1deg); }
            75% { transform: translateY(-12px) rotate(-0.5deg); }
        }

        /* Bottom footnote */
        .footnote {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: var(--muted);
            opacity: 0.6;
            letter-spacing: 0.05em;
            z-index: 1;
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="deco-line"></div>

    <!-- Floating task pills -->
    <div class="floaters">
        <div class="pill"><span class="dot"></span> Buy groceries</div>
        <div class="pill"><span class="dot"></span> Finish the report</div>
        <div class="pill"><span class="dot"></span> Call the dentist</div>
        <div class="pill"><span class="dot"></span> Read 30 pages</div>
        <div class="pill"><span class="dot"></span> Morning workout</div>
    </div>

    <!-- Main content -->
    <div class="container">
        <div class="badge">✦ Stay Organized</div>

        <h1>Your tasks,<br><em>finally</em> in order.</h1>

        <p class="subtitle">Simple, beautiful task management.<br>No clutter, no noise — just focus.</p>

        <div class="actions">
            <a href="/login" class="btn btn-primary">
                Sign in
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h8M7 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </a>
            <a href="/signup" class="btn btn-secondary">Create account</a>
        </div>
    </div>

    <p class="footnote">Crafted for clarity &amp; calm.</p>

</body>
</html>
