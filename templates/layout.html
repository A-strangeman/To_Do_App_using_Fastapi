<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ToDo App{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ── LIGHT MODE (default) ── */
        :root {
            --cream: #FAF7F2;
            --dark: #1A1612;
            --accent: #E85D2F;
            --muted: #8C8279;
            --card: #F2EDE5;
            --border: rgba(26,22,18,0.08);
            --nav-bg: rgba(250,247,242,0.85);
            --glow: rgba(232,93,47,0.09);
        }

        /* ── DARK MODE (system preference) ── */
        @media (prefers-color-scheme: dark) {
            :root {
                --cream: #18150F;
                --dark: #F5F0E8;
                --accent: #E85D2F;
                --muted: #7A7168;
                --card: #221E17;
                --border: rgba(245,240,232,0.07);
                --nav-bg: rgba(24,21,15,0.88);
                --glow: rgba(232,93,47,0.13);
            }
        }

        /* ── DARK MODE (manual override via JS) ── */
        html[data-theme="dark"] {
            --cream: #18150F;
            --dark: #F5F0E8;
            --accent: #E85D2F;
            --muted: #7A7168;
            --card: #221E17;
            --border: rgba(245,240,232,0.07);
            --nav-bg: rgba(24,21,15,0.88);
            --glow: rgba(232,93,47,0.13);
        }

        html[data-theme="light"] {
            --cream: #FAF7F2;
            --dark: #1A1612;
            --accent: #E85D2F;
            --muted: #8C8279;
            --card: #F2EDE5;
            --border: rgba(26,22,18,0.08);
            --nav-bg: rgba(250,247,242,0.85);
            --glow: rgba(232,93,47,0.09);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* Grain texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* Ambient glow top-right */
        body::after {
            content: '';
            position: fixed;
            top: -200px; right: -150px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, var(--glow), transparent 70%);
            pointer-events: none;
            z-index: 0;
            filter: blur(60px);
        }

        /* ── NAVBAR ── */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 40px;
            height: 64px;
            background: var(--nav-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            animation: slideDown 0.6s cubic-bezier(0.22,1,0.36,1) both;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Logo / Brand */
        nav h1 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -0.03em;
            color: var(--dark);
            margin-right: auto; /* push links to right */
            display: flex;
            align-items: center;
            gap: 8px;
        }

        nav h1::before {
            content: '✦';
            font-size: 14px;
            color: var(--accent);
        }

        /* Nav links */
        nav a {
            font-size: 14px;
            font-weight: 400;
            color: var(--muted);
            text-decoration: none;
            padding: 7px 14px;
            border-radius: 100px;
            transition: background 0.18s ease, color 0.18s ease;
            white-space: nowrap;
        }

        nav a:hover {
            background: var(--card);
            color: var(--dark);
        }

        /* Special CTA links */
        nav a[href="/add"],
        nav a[href="/login"],
        nav a[href="/signup"] {
            background: var(--dark);
            color: var(--cream);
            padding: 7px 20px;
            font-weight: 500;
            transition: background 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
        }

        nav a[href="/add"]:hover,
        nav a[href="/login"]:hover,
        nav a[href="/signup"]:hover {
            background: var(--accent);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(232,93,47,0.3);
        }

        nav a[href="/logout"] {
            color: var(--muted);
            font-size: 13px;
        }

        nav a[href="/logout"]:hover {
            background: rgba(232,93,47,0.08);
            color: var(--accent);
        }

        /* Divider dot between nav groups */
        .nav-divider {
            width: 4px; height: 4px;
            border-radius: 50%;
            background: var(--border);
            flex-shrink: 0;
        }

        /* ── THEME TOGGLE ── */
        .theme-toggle {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--card);
            color: var(--muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease, transform 0.2s ease;
            font-size: 15px;
            margin-left: 4px;
        }

        .theme-toggle:hover {
            background: var(--cream);
            border-color: rgba(232,93,47,0.3);
            color: var(--accent);
            transform: rotate(20deg) scale(1.1);
        }

        .icon-sun  { display: none; }
        .icon-moon { display: block; }

        html[data-theme="dark"] .icon-sun  { display: block; }
        html[data-theme="dark"] .icon-moon { display: none; }

        @media (prefers-color-scheme: dark) {
            html:not([data-theme="light"]) .icon-sun  { display: block; }
            html:not([data-theme="light"]) .icon-moon { display: none; }
        }

        /* ── MAIN ── */
        main {
            position: relative;
            z-index: 1;
            flex: 1;
            padding: 48px 40px;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            animation: fadeUp 0.7s 0.15s cubic-bezier(0.22,1,0.36,1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── FOOTER ── */
        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px 40px;
            font-size: 12px;
            color: var(--muted);
            opacity: 0.55;
            letter-spacing: 0.05em;
            border-top: 1px solid var(--border);
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 640px) {
            nav {
                padding: 0 20px;
                gap: 4px;
                flex-wrap: wrap;
                height: auto;
                padding-top: 14px;
                padding-bottom: 14px;
            }
            nav h1 { width: 100%; margin-bottom: 4px; }
            main { padding: 32px 20px; }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav>
        <h1>My ToDo App</h1>

        <a href="/">Home</a>

        {% if request.session.get("user_id") %}
            <span class="nav-divider"></span>
            <a href="/add">+ Add Todo</a>
            <a href="/account">Account</a>
            <a href="/logout">Logout</a>
        {% else %}
            <span class="nav-divider"></span>
            <a href="/login">Login</a>
            <a href="/signup">Sign Up</a>
        {% endif %}

        <!-- Dark / Light mode toggle -->
        <button class="theme-toggle" id="themeToggle" title="Toggle dark mode" aria-label="Toggle theme">
            <span class="icon-moon">🌙</span>
            <span class="icon-sun">☀️</span>
        </button>
    </nav>

    <!-- Main Content -->
    <main>
        {% block content %}
        <!-- Child templates will insert content here -->
        {% endblock %}
    </main>

    <footer>Crafted for clarity &amp; calm. &nbsp;✦</footer>

    <script src="/static/js/script.js"></script>
    <script>
        // Apply saved theme immediately (prevents flash)
        (function () {
            const saved = localStorage.getItem('theme');
            if (saved) {
                document.documentElement.setAttribute('data-theme', saved);
            }
        })();

        // Toggle on button click
        document.getElementById('themeToggle').addEventListener('click', function () {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');

            // Determine effective current theme (account for system preference)
            const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const isDark = current === 'dark' || (!current && systemDark);

            const next = isDark ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        });
    </script>
</body>
</html>
